<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Argus — Ontology Navigator</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root { --bg:#0f1218; --fg:#e6edf3; --muted:#8b9fb5; --accent:#7ab8ff; --edge:#3a5b7f; --panel:#161b22; }
  html,body { margin:0; padding:0; height:100%; background:var(--bg); color:var(--fg); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  header { padding:.6rem 1rem; border-bottom:1px solid #22303c; display:flex; align-items:center; gap:1rem; position:relative; z-index: 30; }
  header h1 { margin:0; font-size:1.1rem; font-weight:600; letter-spacing:.03em; cursor:pointer; }
  header .tag { font-size:.72rem; color:var(--muted); }
  header .search-wrap { position:relative; flex:1; max-width: 420px; margin-left: auto; }
  header input[type=search] { width:100%; padding:.5rem .7rem; border-radius:6px; background:#0a0d13; color:var(--fg); border:1px solid #22303c; font-size:.9rem; }
  header input[type=search]:focus { outline:none; border-color:var(--accent); }
  #results { position:absolute; top:calc(100% + 6px); left:0; right:0; background:var(--panel); border:1px solid #22303c; border-radius:6px; max-height: 60vh; overflow:auto; display:none; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
  #results.show { display:block; }
  #results .item { padding:.55rem .8rem; border-bottom:1px solid #22303c; cursor:pointer; font-size:.9rem; }
  #results .item:last-child { border-bottom:none; }
  #results .item:hover { background:#1c2530; }
  #results .item .type { color:var(--accent); font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; margin-left:.5rem; }
  #results .item .mode { color:var(--muted); font-size:.68rem; margin-left:.4rem; }
  #results .empty { padding:1rem .8rem; color:var(--muted); font-size:.85rem; }
  #results .empty strong { color:var(--fg); }
  main { display:grid; grid-template-columns: 320px 1fr; height:calc(100vh - 3.1rem); }
  aside { border-right:1px solid #22303c; padding:1rem; overflow:auto; }
  aside h2 { font-size:.85rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:1rem 0 .4rem; }
  aside .entity-name { font-size:1.3rem; font-weight:600; margin:0 0 .3rem; }
  aside .type { font-size:.8rem; color:var(--accent); text-transform:uppercase; letter-spacing:.06em; }
  aside .prominence { color:var(--muted); font-size:.72rem; margin-top:.15rem; }
  aside .prominence .num { color:var(--fg); font-weight:600; }
  aside .share { display:inline-block; margin-top:.4rem; font-size:.72rem; color:var(--muted); }
  aside .share a { color:var(--accent); }
  ul { list-style:none; padding:0; margin:0; }
  li.article { padding:.4rem 0; border-bottom:1px solid #22303c; font-size:.82rem; }
  li.article a { color:var(--accent); text-decoration:none; }
  li.article a:hover { text-decoration:underline; }
  li.article .ref { display:block; font-size:.65rem; color:var(--muted); margin-top:.15rem; }
  .connection-group { margin-bottom: .8rem; }
  .connection-group .rel-head { font-size:.72rem; color:var(--accent); text-transform:uppercase; letter-spacing:.06em; font-weight:600; margin: .5rem 0 .2rem; }
  li.neighbor { padding:.35rem 0; border-bottom:1px dashed #22303c; font-size:.82rem; display:flex; align-items:center; gap:.3rem; cursor:pointer; }
  li.neighbor:last-child { border-bottom:none; }
  li.neighbor:hover { color:var(--accent); }
  li.neighbor .swatch { width:6px; height:6px; border-radius:2px; flex-shrink:0; }
  li.neighbor .name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  li.neighbor .cite-count { color:var(--muted); font-size:.7rem; font-variant-numeric:tabular-nums; }
  /* Hover peek — small floating card over the graph */
  #peek {
    position: absolute; z-index: 20;
    background: rgba(15,20,28,.96); border: 1px solid #22303c;
    border-radius: 6px; padding: .4rem .55rem;
    font-size: .78rem; color: var(--fg); pointer-events: none;
    box-shadow: 0 6px 24px rgba(0,0,0,.5); backdrop-filter: blur(4px);
    display: none; max-width: 260px;
  }
  #peek.show { display: block; }
  #peek .type { color: var(--accent); font-size: .65rem; text-transform: uppercase; letter-spacing: .06em; }
  #peek .deg { color: var(--muted); font-size: .68rem; margin-top: .15rem; }
  #graph-wrap { position: relative; width: 100%; height: 100%; }
  #cy { width: 100%; height: 100%; background: #0a0d13; }
  #filters {
    position: absolute; top: .75rem; right: .75rem; z-index: 10;
    background: rgba(15, 20, 28, 0.94); border: 1px solid #22303c;
    border-radius: 8px; padding: .55rem .7rem; font-size: .78rem;
    max-width: 260px; max-height: calc(100% - 1.5rem); overflow: auto;
    box-shadow: 0 6px 24px rgba(0,0,0,.5); backdrop-filter: blur(4px);
  }
  #filters h3 { margin: .3rem 0 .2rem; font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
  #filters .row { display: flex; align-items: center; gap: .5rem; padding: .18rem 0; cursor: pointer; }
  #filters .row input { margin: 0; }
  #filters .row .label { flex: 1; }
  #filters .row .count { color: var(--muted); font-variant-numeric: tabular-nums; }
  #filters .swatch { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: .25rem; }
  #filters .slider-wrap { padding: .35rem 0; }
  #filters .slider-wrap label { color: var(--muted); font-size: .72rem; display: block; margin-bottom: .2rem; }
  #filters input[type=range] { width: 100%; }
  #filters .showing {
    display: block; padding: .35rem .5rem; margin-top: .4rem;
    border-top: 1px solid #22303c;
    color: var(--fg); font-weight: 600; font-size: .72rem;
    letter-spacing: .03em; text-transform: uppercase;
  }
  #filters .showing .num { color: var(--accent); }
  .empty { color:var(--muted); padding:2rem; text-align:center; }
  .not-found { padding:2rem 1rem; }
  .not-found h3 { margin: 0 0 .4rem; font-size:1rem; color:var(--fg); }
  .not-found p { margin: 0; color:var(--muted); font-size:.85rem; }
</style>
</head>
<body>
<header>
  <h1 id="home">Argus</h1>
  <span class="tag">ontology navigator · every edge cited</span>
  <div class="search-wrap">
    <input id="q" type="search" placeholder="Search entities (e.g. GEO Group, ICE, Trump)…" autocomplete="off" />
    <div id="results"></div>
  </div>
</header>
<main>
  <aside id="panel"><div class="empty">Loading…</div></aside>
  <div id="graph-wrap">
    <div id="cy"></div>
    <div id="filters"></div>
    <div id="peek"></div>
  </div>
</main>
<script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/layout-base@2.0.1/layout-base.js"></script>
<script src="https://unpkg.com/cose-base@2.2.0/cose-base.js"></script>
<script src="https://unpkg.com/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
<script>
if (typeof cytoscapeFcose !== 'undefined') {
  cytoscape.use(cytoscapeFcose);
}
// Default anchor for the profile page — GEO Group's canonical id (seeded in P0).
const GEO_GROUP_ID = 'b393bc4c-bacc-4556-9589-b6446854608e';

// Palettes.
const NODE_TYPE_COLOR = {
  organization: '#3a5b7f',
  person: '#c084fc',
  candidate: '#eab308',
  pac: '#22c55e',
  agency: '#ef4444',
  event: '#f97316',
  concept: '#0ea5e9',
  place: '#14b8a6',
  unknown: '#64748b',
};

// Current entity + last-fetched raw graph; the filter panel reruns render off these.
let currentEntity = null;
let currentGraph = { nodes: [], edges: [] };
// Filter state persists across navigation so a user's chosen preferences stick.
const filterState = {
  relations: {},   // relation -> bool  (undefined = defaults to true)
  nodeTypes: {},   // type -> bool
  minWeight: 0,
  topN: 200,
};

function idFromPath() {
  const m = window.location.pathname.match(/^\/entity\/([0-9a-f-]{36})/i);
  return m ? m[1] : null;
}

async function fetchEntity(id) {
  const r = await fetch(`/api/entities/${id}`);
  if (!r.ok) return null;
  return r.json();
}

async function fetchGraph(id, hops=1) {
  const r = await fetch(`/api/entities/${id}/subgraph?hops=${hops}`);
  return r.json();
}

async function fetchSearch(qv) {
  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(qv)}&limit=20`);
    if (!r.ok) return { q: qv, matched: 0, results: [], error: `search failed (${r.status})` };
    const data = await r.json();
    if (!data || !Array.isArray(data.results)) return { q: qv, matched: 0, results: [] };
    return data;
  } catch (err) {
    return { q: qv, matched: 0, results: [], error: err && err.message ? err.message : 'network error' };
  }
}

function isRelationOn(rel) {
  return filterState.relations[rel] !== false;
}
function isNodeTypeOn(t) {
  return filterState.nodeTypes[t] !== false;
}

// Compute the filtered subset of the graph for display.
function computeFilteredGraph(graph) {
  const totalEdges = graph.edges.length;
  const totalNodes = graph.nodes.length;
  // Apply relation-type filter.
  let edges = graph.edges.filter(e => isRelationOn(e.data.label));
  // Apply min-weight cutoff.
  edges = edges.filter(e => (Number(e.data.weight) || 0) >= filterState.minWeight);
  // Apply top-N by weight.
  edges.sort((a, b) => (Number(b.data.weight) || 0) - (Number(a.data.weight) || 0));
  edges = edges.slice(0, filterState.topN);
  // Nodes that survive: the anchor + any endpoint of a kept edge, ANDed with the node-type toggle.
  const anchor = currentEntity ? currentEntity.id : null;
  const keepIds = new Set(anchor ? [anchor] : []);
  for (const e of edges) {
    keepIds.add(e.data.source);
    keepIds.add(e.data.target);
  }
  let nodes = graph.nodes.filter(n => keepIds.has(n.data.id));
  nodes = nodes.filter(n => n.data.id === anchor || isNodeTypeOn(n.data.type));
  // Drop edges whose endpoints got filtered out by the node-type toggle.
  const nodeSet = new Set(nodes.map(n => n.data.id));
  edges = edges.filter(e => nodeSet.has(e.data.source) && nodeSet.has(e.data.target));
  return { nodes, edges, totalNodes, totalEdges };
}

function renderPanel(entity) {
  // Helen 2026-07-17: real dossier from the enriched /api/entities/{id}.
  const panel = document.getElementById('panel');
  const surfaceTag = entity.surface_mode && entity.surface_mode !== 'open' ? ` · ${entity.surface_mode}` : '';
  const prom = entity.prominence || {};
  const articles = Array.isArray(entity.articles) ? entity.articles : [];
  const connections = entity.connections || {};
  // Render each relation's neighbours, sorted by citation_count desc (already done server-side).
  const relKeys = Object.keys(connections).sort((a, b) => connections[b].length - connections[a].length);
  const relBlocks = relKeys.map(rel => {
    const items = connections[rel];
    return `
      <div class="connection-group">
        <div class="rel-head">${rel.replace(/_/g,' ')} · ${items.length}</div>
        <ul>
          ${items.map(n => `
            <li class="neighbor" data-id="${n.id}">
              <span class="swatch" style="background:${NODE_TYPE_COLOR[n.type] || NODE_TYPE_COLOR.unknown}"></span>
              <span class="name" title="${n.label}">${n.label}</span>
              <span class="cite-count">${n.citation_count || 0}</span>
            </li>
          `).join('')}
        </ul>
      </div>
    `;
  }).join('');
  panel.innerHTML = `
    <p class="type">${entity.type}${surfaceTag}</p>
    <p class="entity-name">${entity.label}</p>
    <p class="prominence">
      <span class="num">${prom.degree || 0}</span> connections ·
      <span class="num">${prom.articles || 0}</span> cited articles
    </p>
    <span class="share">shareable: <a href="/entity/${entity.id}">/entity/${entity.id.slice(0,8)}…</a></span>
    ${entity.surface_mode === 'alias'
      ? `<h2>In the news</h2>
         <div class="empty" style="padding:.5rem 0;font-size:.8rem;">
           <strong>${prom.articles || 0}</strong> cited article${(prom.articles === 1) ? '' : 's'} — source URLs are hidden to protect this private individual's identity.
         </div>`
      : `<h2>In the news</h2>
         ${articles.length === 0
           ? '<div class="empty" style="padding:.5rem 0;font-size:.8rem;">No Tony Times articles cite this entity yet.</div>'
           : `<ul>${articles.slice(0,25).map(a => `
             <li class="article">
               <a href="${a.url}" target="_blank" rel="noopener">${a.ref || a.url}</a>
             </li>
           `).join('')}${articles.length > 25 ? `<li class="article" style="color:var(--muted);border:none;">+${articles.length - 25} more…</li>` : ''}</ul>`}
      `}
    <h2>Connections</h2>
    ${relKeys.length === 0 ? '<div class="empty" style="padding:.5rem 0;font-size:.8rem;">No connections surfaced yet.</div>' : relBlocks}
  `;
  // Wire neighbour click → navigate.
  panel.querySelectorAll('li.neighbor').forEach(el => {
    el.addEventListener('click', () => navigate(el.dataset.id));
  });
}

function renderNotFound(q) {
  document.getElementById('panel').innerHTML = `
    <div class="not-found">
      <h3>No matching entity for “${q}”</h3>
      <p>Argus is a graph of <em>entities</em> — organizations, PACs, agencies, candidates, and people that appear in citation-sourced records. Topics (like “civil war” or “detention”) are not entities in this graph; search for a company, agency, or public figure instead. E.g. <a href="/entity/${GEO_GROUP_ID}">GEO Group</a>.</p>
    </div>
  `;
  document.getElementById('cy').innerHTML = '';
  document.getElementById('filters').innerHTML = '';
}

// Filter panel — relation + node-type toggles with counts, min-weight slider, top-N cap, "showing X of Y".
function renderFilterPanel(graph, filtered) {
  const relCounts = {};
  for (const e of graph.edges) relCounts[e.data.label] = (relCounts[e.data.label] || 0) + 1;
  const typeCounts = {};
  for (const n of graph.nodes) typeCounts[n.data.type] = (typeCounts[n.data.type] || 0) + 1;
  const relRows = Object.entries(relCounts).sort((a, b) => b[1] - a[1]).map(([r, c]) => `
    <label class="row">
      <input type="checkbox" data-rel="${r}" ${isRelationOn(r) ? 'checked' : ''}>
      <span class="label">${r.replace(/_/g, ' ')}</span>
      <span class="count">${c}</span>
    </label>`).join('');
  const typeRows = Object.entries(typeCounts).sort((a, b) => b[1] - a[1]).map(([t, c]) => `
    <label class="row">
      <input type="checkbox" data-type="${t}" ${isNodeTypeOn(t) ? 'checked' : ''}>
      <span class="swatch" style="background:${NODE_TYPE_COLOR[t] || NODE_TYPE_COLOR.unknown}"></span>
      <span class="label">${t}</span>
      <span class="count">${c}</span>
    </label>`).join('');
  document.getElementById('filters').innerHTML = `
    <h3>Relation types</h3>
    ${relRows || '<div style="color:var(--muted);font-size:.72rem;">no edges</div>'}
    <h3>Node types</h3>
    ${typeRows || '<div style="color:var(--muted);font-size:.72rem;">no nodes</div>'}
    <div class="slider-wrap">
      <label>min edge weight: <span class="showing"><span class="num" id="w-cur">${filterState.minWeight}</span></span></label>
      <input type="range" id="min-w" min="0" max="20" step="1" value="${filterState.minWeight}">
      <label>top-N edges by weight: <span class="showing"><span class="num" id="n-cur">${filterState.topN}</span></span></label>
      <input type="range" id="top-n" min="10" max="500" step="10" value="${filterState.topN}">
    </div>
    <div class="showing">
      showing <span class="num">${filtered.edges.length}</span> of <span class="num">${filtered.totalEdges}</span> edges ·
      <span class="num">${filtered.nodes.length}</span> of <span class="num">${filtered.totalNodes}</span> nodes
    </div>
  `;
  document.getElementById('filters').querySelectorAll('input[type=checkbox][data-rel]').forEach(el => {
    el.addEventListener('change', () => { filterState.relations[el.dataset.rel] = el.checked; renderGraph(currentEntity, currentGraph); });
  });
  document.getElementById('filters').querySelectorAll('input[type=checkbox][data-type]').forEach(el => {
    el.addEventListener('change', () => { filterState.nodeTypes[el.dataset.type] = el.checked; renderGraph(currentEntity, currentGraph); });
  });
  document.getElementById('min-w').addEventListener('input', (ev) => {
    filterState.minWeight = Number(ev.target.value);
    document.getElementById('w-cur').textContent = filterState.minWeight;
    renderGraph(currentEntity, currentGraph);
  });
  document.getElementById('top-n').addEventListener('input', (ev) => {
    filterState.topN = Number(ev.target.value);
    document.getElementById('n-cur').textContent = filterState.topN;
    renderGraph(currentEntity, currentGraph);
  });
}

function renderGraph(entity, graph) {
  currentEntity = entity;
  currentGraph = graph;
  const filtered = computeFilteredGraph(graph);
  renderFilterPanel(graph, filtered);
  // Degree count from the FILTERED edges (used for node sizing so nodes shrink with filters).
  const degree = {};
  for (const e of filtered.edges) {
    degree[e.data.source] = (degree[e.data.source] || 0) + 1;
    degree[e.data.target] = (degree[e.data.target] || 0) + 1;
  }
  // fcose falls back to cose-bilkent-ish behaviour when the extension isn't loaded.
  const layoutName = (typeof cytoscapeFcose !== 'undefined') ? 'fcose' : 'cose';
  const cy = cytoscape({
    container: document.getElementById('cy'),
    elements: [
      ...filtered.nodes.map(n => ({
        data: {
          id: n.data.id,
          label: n.data.label,
          type: n.data.type,
          degree: degree[n.data.id] || 0,
        },
      })),
      ...filtered.edges.map(e => ({
        data: {
          id: e.data.id,
          source: e.data.source,
          target: e.data.target,
          label: e.data.label.replace(/_/g, ' '),
          weight: Number(e.data.weight) || 1,
        },
      })),
    ],
    style: [
      { selector: 'node', style: {
          'background-color': (n) => NODE_TYPE_COLOR[n.data('type')] || NODE_TYPE_COLOR.unknown,
          'label': 'data(label)',
          'color': '#e6edf3',
          'font-size': 10,
          'text-valign': 'center',
          'text-halign': 'center',
          'width': (n) => Math.max(18, 22 + Math.sqrt(n.data('degree')) * 8),
          'height': (n) => Math.max(18, 22 + Math.sqrt(n.data('degree')) * 8),
      }},
      { selector: `node[id = "${entity.id}"]`, style: { 'background-color': '#7ab8ff', 'width': 64, 'height': 64, 'font-weight': 'bold' } },
      { selector: 'edge', style: {
          'width': (e) => Math.max(1, Math.min(10, 1 + Math.log(1 + e.data('weight')) * 1.6)),
          'line-color': '#3a5b7f',
          'target-arrow-color': '#3a5b7f',
          'target-arrow-shape': 'triangle',
          'curve-style': 'bezier',
          'label': 'data(label)',
          'font-size': 7,
          'color': '#8b9fb5',
          'text-rotation': 'autorotate',
          'opacity': 0.85,
      }},
    ],
    layout: layoutName === 'fcose'
      ? { name: 'fcose', animate: false, quality: 'default', randomize: true, nodeSeparation: 100, idealEdgeLength: 120, nodeRepulsion: 8000, gravity: 0.3, gravityRange: 3.8, packComponents: true }
      : { name: 'cose', animate: false, nodeRepulsion: 8000, idealEdgeLength: 120 },
  });
  cy.on('tap', 'node', (evt) => navigate(evt.target.id()));

  // Hover peek — floating card with label + type + degree.
  const peek = document.getElementById('peek');
  cy.on('mouseover', 'node', (evt) => {
    const n = evt.target;
    peek.innerHTML = `
      <div>${n.data('label')}</div>
      <div class="type">${n.data('type')}</div>
      <div class="deg">${n.data('degree') || 0} connections in view</div>
    `;
    peek.classList.add('show');
  });
  cy.on('mousemove', 'node', (evt) => {
    const wrap = document.getElementById('graph-wrap').getBoundingClientRect();
    const x = evt.originalEvent.clientX - wrap.left + 12;
    const y = evt.originalEvent.clientY - wrap.top + 12;
    peek.style.left = `${x}px`;
    peek.style.top = `${y}px`;
  });
  cy.on('mouseout', 'node', () => {
    peek.classList.remove('show');
  });
}

async function navigate(id, push = true) {
  const [e, g] = await Promise.all([fetchEntity(id), fetchGraph(id, 1)]);
  if (e) {
    if (push && window.location.pathname !== `/entity/${id}`) {
      history.pushState({id}, '', `/entity/${id}`);
    }
    renderPanel(e);
    renderGraph(e, g);
    return true;
  }
  return false;
}

// --- search UX ---
let searchTimer = null;
const q = document.getElementById('q');
const results = document.getElementById('results');

function renderEmptyState(val, extra) {
  return `
    <div class="empty">
      <strong>No entity found for “${val}”.</strong><br>
      Argus indexes entities (people, orgs, PACs, agencies, candidates).
      Topics like <em>“civil war”</em> or <em>“the us”</em> aren't entities here — try a
      person, organization, or agency name.
      ${extra ? `<div style="margin-top:.5rem;opacity:.7;font-size:.7rem;">${extra}</div>` : ''}
    </div>
  `;
}
function renderSearchLoading(val) {
  return `<div class="empty">Searching for <strong>${val}</strong>…</div>`;
}

q.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const val = q.value.trim();
  if (!val) { results.classList.remove('show'); results.innerHTML=''; return; }
  results.innerHTML = renderSearchLoading(val);
  results.classList.add('show');
  searchTimer = setTimeout(async () => {
    const data = await fetchSearch(val);
    if (q.value.trim() !== val) return;
    const items = Array.isArray(data.results) ? data.results : [];
    if (items.length === 0) {
      results.innerHTML = renderEmptyState(val, data.error);
    } else {
      results.innerHTML = items.map(r => `
        <div class="item" data-id="${r.id}">
          ${r.label}<span class="type">${r.type}</span>${r.surface_mode !== 'open' ? `<span class="mode">${r.surface_mode}</span>` : ''}
        </div>
      `).join('');
    }
    results.classList.add('show');
  }, 200);
});

results.addEventListener('click', async (ev) => {
  const item = ev.target.closest('.item');
  if (!item) return;
  results.classList.remove('show'); q.value = '';
  await navigate(item.dataset.id);
});

q.addEventListener('keydown', async (ev) => {
  if (ev.key === 'Escape') { results.classList.remove('show'); }
  if (ev.key === 'Enter') {
    const items = results.querySelectorAll('.item');
    if (items.length === 1) {
      results.classList.remove('show');
      await navigate(items[0].dataset.id);
      q.value = '';
    } else if (items.length === 0) {
      renderNotFound(q.value);
      results.classList.remove('show');
    }
  }
});

document.addEventListener('click', (ev) => {
  if (!ev.target.closest('.search-wrap')) results.classList.remove('show');
});
document.getElementById('home').addEventListener('click', () => navigate(GEO_GROUP_ID));

window.addEventListener('popstate', () => {
  const id = idFromPath() || GEO_GROUP_ID;
  navigate(id, false);
});

(async () => {
  const id = idFromPath() || GEO_GROUP_ID;
  const ok = await navigate(id, false);
  if (!ok) renderNotFound(id);
})();
</script>
</body>
</html>
