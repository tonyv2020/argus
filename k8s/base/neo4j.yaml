apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: argus
spec:
  selector:
    app: neo4j
  ports:
    - name: bolt
      port: 7687
    - name: http
      port: 7474
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: argus
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5-community
          env:
            - name: NEO4J_AUTH
              value: neo4j/argus
            - name: NEO4J_server_memory_pagecache_size
              value: 512m
            - name: NEO4J_server_memory_heap_max__size
              value: 1G
          ports:
            - containerPort: 7687
            - containerPort: 7474
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
