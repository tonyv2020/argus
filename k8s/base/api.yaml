apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: argus
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: argus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: alembic-upgrade
          image: registry.lan/argus/api:local
          command:
            - sh
            - -c
            - alembic upgrade head
          envFrom:
            - secretRef:
                name: argus-env
      containers:
        - name: api
          image: registry.lan/argus/api:local
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: argus-env
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
