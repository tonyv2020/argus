apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: argus
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: argus
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          # glibc pgvector image — musl (Alpine) postgres silently corrupts text btree
          # collation (see hollywood/docs/postmortem-2026-05-12-postgres-index-corruption.md).
          image: pgvector/pgvector:pg16
          env:
            - name: POSTGRES_DB
              value: argus
            - name: POSTGRES_USER
              value: argus
            - name: POSTGRES_PASSWORD
              value: argus
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
